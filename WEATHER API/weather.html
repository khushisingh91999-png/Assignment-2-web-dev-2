
<!DOCTYPE html>
<html>
<head>
    <title>Async Weather Tracker</title>
    <link rel="stylesheet" href="weather.css">
</head>
<body>

    <h1>🌤 Async Weather Tracker</h1>

    <div class="container">

        <!-- LEFT CARD -->
        <div class="card">
            <h3>Search City</h3>

            <div class="search-box">
                <input type="text" id="cityInput" placeholder="Enter city name">
                <button onclick="fetchWeather()">Search</button>
            </div>

            <h3>Search History</h3>
            <div id="history"></div>
        </div>

        <!-- RIGHT CARD -->
        <div class="card">
            <h3>Weather Info</h3>

            <div id="weatherData">
                <div class="row"><span>City</span><span id="city">-</span></div>
                <div class="row"><span>Temp</span><span id="temp">-</span></div>
                <div class="row"><span>Weather</span><span id="weather">-</span></div>
                <div class="row"><span>Humidity</span><span id="humidity">-</span></div>
                <div class="row"><span>Wind</span><span id="wind">-</span></div>
            </div>

            <p id="errorMsg" class="error"></p>
        </div>

    </div>

    <!-- Console Section -->
    <div class="console-card">
        <h3>Console – Event Loop</h3>
        <div id="consoleBox" class="console"></div>
    </div>

<script src="weather.js"></script>
</body>
</html>
