<!DOCTYPE html>
<html>
<head>
<title>Async Weather Tracker</title>
<link rel="stylesheet" href="weather.css">
</head>

<body>

<div class="wrapper">

<h1>🌤 Async Weather Tracker</h1>

<div class="top">

<div class="card">

<h3>Search City</h3>

<div class="searchBox">
<input id="cityInput" placeholder="Enter city name">
<button onclick="searchWeather()">Search</button>
</div>

<h4>Search History</h4>
<div id="history"></div>

</div>

<div class="card">

<h3>Weather Info</h3>

<div class="weatherRow">
<span>City</span>
<span id="city">-</span>
</div>

<div class="weatherRow">
<span>Temp</span>
<span id="temp">-</span>
</div>

<div class="weatherRow">
<span>Weather</span>
<span id="weather">-</span>
</div>

<div class="weatherRow">
<span>Humidity</span>
<span id="humidity">-</span>
</div>

<div class="weatherRow">
<span>Wind</span>
<span id="wind">-</span>
</div>

<p id="error"></p>

</div>

</div>


<div class="consoleCard">

<h3>Console – Event Loop</h3>

<div id="consoleBox"></div>

</div>

</div>

<script src="weather.js"></script>

</body>
</html>
